<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa de Dia dos Namorados</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ffe3e3 0%, #ffd1d1 50%, #ffa8a8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            font-family: 'Arial', sans-serif;
        }
        .decoracao-fundo {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        /* O coração agora funciona como um link real */
        .coracao-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        .coracao {
            background-color: #ff4d6d;
            display: inline-block;
            height: 140px;
            position: relative;
            transform: rotate(-45deg);
            width: 140px;
            animation: pulsar 1.2s infinite;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
            cursor: pointer;
        }
        .coracao:before, .coracao:after {
            content: "";
            background-color: #ff4d6d;
            border-radius: 50%;
            height: 140px;
            position: absolute;
            width: 140px;
        }
        .coracao:before { top: -70px; left: 0; }
        .coracao:after { left: 70px; top: 0; }

        @keyframes pulsar {
            0% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.15) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }
        .clique-texto {
            margin-top: 40px;
            color: #ff4d6d;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: piscar 1.5s infinite;
        }
        @keyframes piscar {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="decoracao-fundo">
        <svg style="position:absolute; top:10%; left:10%; fill:#ffb3c1; opacity:0.5;" width="30" height="30" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg style="position:absolute; top:20%; right:15%; fill:#ffb3c1; opacity:0.6;" width="45" height="45" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg style="position:absolute; bottom:15%; left:20%; fill:#ffc2d1; opacity:0.5;" width="40" height="40" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <a href="carta.html" target="_blank" class="coracao-link">
        <div class="coracao"></div>
        <div class="clique-texto">Clique aqui</div>
    </a>

</body>
</html>
